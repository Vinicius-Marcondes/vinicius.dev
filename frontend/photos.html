<!doctype html>
<html lang="en" data-theme="safelight">
<head>
<meta charset="utf-8">
<title>photos · vinicius.dev</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="assets/logo-mark.svg">
<link rel="stylesheet" href="tokens/colors_and_type.css">
<link rel="stylesheet" href="tokens/safelight.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-0); overflow-x: hidden; }
  #app { min-height: 100vh; }
  /* very faint site-wide scanline — like a CRT you forgot to turn off */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(to bottom, rgba(240,228,207,0.018) 0 1px, transparent 1px 3px);
    mix-blend-mode: screen;
  }
  @keyframes crt-glitch {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-1px,0.5px); }
    40% { transform: translate(1px,-0.5px); }
    60% { transform: translate(-0.5px,0); }
    80% { transform: translate(0.5px,0); }
  }
  .glitch-hover:hover { animation: crt-glitch 240ms steps(4) 1; }
  @media (prefers-reduced-motion: reduce) {
    .glitch-hover:hover { animation: none !important; }
  }
</style>
</head>
<body>
<div id="app" data-screen-label="03 Photos"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="landing/ChannelBug.jsx"></script>
<script type="text/babel" src="landing/Footer.jsx"></script>
<script type="text/babel" src="photos/data.jsx"></script>
<script type="text/babel" src="photos/FilmFrame.jsx"></script>
<script type="text/babel" src="photos/ContactFrame.jsx"></script>
<script type="text/babel" src="photos/Controls.jsx"></script>
<script type="text/babel" src="photos/Lightbox.jsx"></script>
<script type="text/babel" src="photos/PageBanner.jsx"></script>
<script type="text/babel" src="photos/PageNav.jsx"></script>
<script type="text/babel" src="photos/Tweaks.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "comfy",
    "columns": 4,
    "sprockets": true
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
    const [photos, setPhotos] = React.useState([]);
    const [state, setState] = React.useState({
      query: "", year: "all", location: "all",
    });
    const [lightbox, setLightbox] = React.useState({ open: false, idx: 0 });

    React.useEffect(() => { PhotosData.fetchPhotos().then(setPhotos); }, []);

    const filtered = React.useMemo(
      () => PhotosData.filterPhotos(photos, {
        query: state.query, year: state.year, location: state.location,
      }),
      [photos, state.query, state.year, state.location]
    );
    const years     = React.useMemo(() => PhotosData.allYears(photos), [photos]);
    const locations = React.useMemo(() => PhotosData.allLocations(photos), [photos]);
    const grouped   = React.useMemo(() => PhotosData.groupByMonth(filtered), [filtered]);

    const openAt = (photo) => {
      const idx = filtered.findIndex(f => f.id === photo.id);
      setLightbox({ open: true, idx: Math.max(0, idx) });
    };
    const navLightbox = (delta) => {
      setLightbox(s => ({
        open: true,
        idx: (s.idx + delta + filtered.length) % filtered.length,
      }));
    };

    const cols = tweaks.columns;
    const dense = tweaks.density === "dense";

    const fmtMonth = (k) => {
      const [y, m] = k.split("-");
      const d = new Date(Number(y), Number(m) - 1, 1);
      return d.toLocaleDateString("en-US", { month: "long", year: "numeric" }).toLowerCase();
    };

    return (
      <>
        <div style={{ position: "relative" }}>
          <PhotosNav />
          <ChannelBug channel={5} />
          <PhotosBanner photoCount={photos.length} camera={PhotosData.CAMERA} />
        </div>

        <main style={{ maxWidth: 1120, margin: "0 auto", padding: "24px 32px 64px" }}>
          <PhotosControls
            state={state} setState={setState}
            years={years} locations={locations}
            count={filtered.length} total={photos.length}
          />

          {filtered.length === 0 ? (
            <div style={{
              margin: "40px auto", maxWidth: 560, padding: "40px 20px",
              border: "1px dashed var(--line-2)", textAlign: "center", background: "var(--bg-1)",
            }}>
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 22,
                color: "var(--fg-2)", marginBottom: 10,
                textShadow: "-1px 0 0 rgba(196,58,58,0.55), 1px 0 0 rgba(217,160,90,0.45)",
              }}>NO EXPOSURE</div>
              <div style={{
                fontFamily: "var(--font-mono)", fontSize: 12,
                color: "var(--fg-1)", lineHeight: 1.55,
              }}>nothing in the developing bath matches. widen the filters.</div>
            </div>
          ) : (
            <div style={{ display: "grid", gap: 36 }}>
              {grouped.map(({ month, items }) => (
                <section key={month} data-screen-label={"03." + month}>
                  <MonthHeader month={fmtMonth(month)} count={items.length} />
                  <div className="photo-grid" style={{
                    display: "grid",
                    gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))`,
                    gap: dense ? 8 : 12,
                  }}>
                    {items.map(p => (
                      <ContactFrame key={p.id} photo={p} dense={dense}
                                    onClick={() => openAt(p)} />
                    ))}
                  </div>
                </section>
              ))}
            </div>
          )}
        </main>

        <Footer />

        <Lightbox
          open={lightbox.open}
          photos={filtered}
          index={lightbox.idx}
          onClose={() => setLightbox(s => ({ ...s, open: false }))}
          onNav={navLightbox}
        />

        <PhotosTweaks tweaks={tweaks} onChange={setTweaks} />
      </>
    );
  }

  // A simple month-divider header — "march 2026 // 06 frames"
  function MonthHeader({ month, count }) {
    return (
      <div style={{
        display: "flex", alignItems: "baseline", gap: 14,
        padding: "0 0 10px",
        borderBottom: "1px solid var(--line-2)",
        marginBottom: 14,
        fontFamily: "var(--font-mono)",
      }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 14,
          color: "var(--safelight-soft)",
          letterSpacing: "0.04em",
        }}>{month}</div>
        <div style={{ flex: 1, height: 1, background: "var(--line-1)" }} />
        <div style={{
          fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase",
          color: "var(--fg-2)",
        }}>// {String(count).padStart(2, "0")} frames</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
<style>
  @media (max-width: 999px) {
    main .photo-grid { grid-template-columns: repeat(3, minmax(0,1fr)) !important; }
  }
  @media (max-width: 639px) {
    main .photo-grid { grid-template-columns: repeat(2, minmax(0,1fr)) !important; }
  }
</style>
</body>
</html>
